<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم مدیریت دسته‌بندی اجناس</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid">

        <!-- هدر -->
        <div class="main-header d-flex flex-wrap align-items-center justify-content-between">
            <h1><i class="fas fa-cubes me-2" style="background: none; -webkit-text-fill-color: initial; color: var(--blue);"></i> سامانه مدیریت اجناس</h1>
            <div class="d-flex gap-2">
                <span class="badge bg-success bg-opacity-10 text-success p-2 px-3"><i class="fas fa-check-circle"></i> فعال</span>
                <span class="badge bg-secondary bg-opacity-10 text-secondary p-2 px-3"><i class="far fa-clock"></i> ۱۴۰۵/۰۴/۲۷</span>
            </div>
        </div>

        <!-- تب‌ها -->
        <ul class="nav nav-tabs mb-4" id="mainTabs" role="tablist" style="border-bottom: none; gap: 8px;">
            <li class="nav-item" role="presentation">
                <button class="nav-link active active-tab-green" id="tab-category" data-bs-toggle="tab" data-bs-target="#category" type="button" role="tab">
                    <i class="fas fa-tags"></i> دسته‌بندی اجناس
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link active-tab-blue" id="tab-report" data-bs-toggle="tab" data-bs-target="#report" type="button" role="tab">
                    <i class="fas fa-chart-pie"></i> گزارش کامل
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link active-tab-rose" id="tab-files" data-bs-toggle="tab" data-bs-target="#files" type="button" role="tab">
                    <i class="fas fa-folder-open"></i> فایل‌ها
                </button>
            </li>
        </ul>

        <!-- محتوا -->
        <div class="tab-content">

            <!-- بخش دسته‌بندی -->
            <div class="tab-pane fade show active" id="category" role="tabpanel">
                <div class="card-3d">
                    <h3 class="section-title title-green"><i class="fas fa-plus-circle me-2"></i>ثبت کالا</h3>
                    <div class="row g-4">
                        <!-- دسته‌بندی (ضروری) -->
                        <div class="col-md-3 position-relative">
                            <label class="form-label fw-bold">دسته‌بندی <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-lg" id="catInput" autocomplete="off" oninput="updateDynamicFields(); showCategorySuggestions();">
                            <div id="autocomplete-list" class="autocomplete-items" style="display:none;"></div>
                        </div>
                        <!-- برند (اختیاری با پیشنهاد هوشمند) -->
                        <div class="col-md-3 position-relative">
                            <label class="form-label fw-bold">برند</label>
                            <input type="text" class="form-control form-control-lg" id="brandInput" oninput="autoUpperCase(this); showBrandSuggestions();">
                            <div id="brand-suggestions" class="autocomplete-items" style="display:none;"></div>
                        </div>
                        <!-- مدل (ضروری) -->
                        <div class="col-md-2">
                            <label class="form-label fw-bold">مدل <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-lg" id="modelInput" oninput="autoUpperCase(this); showModelSuggestions();">
                            <div id="model-suggestions" class="autocomplete-items" style="display:none;"></div>
                        </div>
                        <!-- کد قفسه (ضروری) -->
                        <div class="col-md-2">
                            <label class="form-label fw-bold">کد قفسه <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-lg" id="shelfInput" oninput="autoUpperCase(this)">
                        </div>
                        <!-- کد اموال (اختیاری) -->
                        <div class="col-md-2">
                            <label class="form-label fw-bold">کد اموال</label>
                            <input type="text" class="form-control form-control-lg" id="assetInput" oninput="autoUpperCase(this)">
                        </div>
                        <!-- کد محصول (ضروری) -->
                        <div class="col-md-2">
                            <label class="form-label fw-bold">کد محصول <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-lg" id="productCodeInput" oninput="autoUpperCase(this)">
                        </div>
                    </div>

                    <!-- فیلدهای شرطی (دینامیک) -->
                    <div id="dynamicFields" class="row g-4 mt-2"></div>

                    <div class="mt-4 d-flex gap-3 flex-wrap">
                        <button class="btn btn-green btn-lg px-5" onclick="addProduct()"><i class="fas fa-save me-2"></i>ثبت کالا</button>
                        <!-- دکمه جدید ثبت فایل با رنگ سبز لجنی -->
                        <button class="btn btn-forest btn-lg px-5" onclick="addFileFromProduct()"><i class="fas fa-file-upload me-2"></i>ثبت فایل</button>
                        <button class="btn btn-rose btn-lg px-5" onclick="exportCategoryExcel()"><i class="fas fa-file-excel me-2"></i>خروجی اکسل</button>
                    </div>
                </div>

                <div class="card-3d mt-4">
                    <h4 class="section-title title-green"><i class="fas fa-list me-2"></i>لیست کالاهای ثبت شده</h4>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle" id="categoryTable">
                            <thead class="table-light">
                                <tr><th>دسته</th><th>برند</th><th>مدل</th><th>کد قفسه</th><th>کد اموال</th><th>کد محصول</th><th>ویژگی‌ها</th><th>تاریخ ثبت</th><th>عملیات</th></tr>
                            </thead>
                            <tbody id="categoryTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- بخش گزارش (بدون تغییر) -->
            <div class="tab-pane fade" id="report" role="tabpanel">
                <div class="card-3d">
                    <div class="d-flex flex-wrap justify-content-between align-items-center">
                        <h3 class="section-title title-blue"><i class="fas fa-flag me-2"></i>گزارش گروه‌بندی شده</h3>
                        <div class="d-flex gap-2">
                            <button class="btn btn-blue" data-bs-toggle="modal" data-bs-target="#filterModal"><i class="fas fa-sliders-h me-1"></i> فیلتر</button>
                            <button class="btn btn-rose" onclick="exportReportExcel()"><i class="fas fa-file-excel me-1"></i> اکسل</button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control form-control-lg" id="reportSearch" placeholder="جستجو ..." oninput="renderReport()">
                    </div>
                    <div id="reportContainer"></div>
                    <nav class="mt-4" id="paginationContainer">
                        <ul class="pagination pagination-custom justify-content-center"></ul>
                    </nav>
                </div>
            </div>

            <!-- بخش فایل‌ها (بدون تغییر) -->
            <div class="tab-pane fade" id="files" role="tabpanel">
                <div class="card-3d">
                    <div class="d-flex flex-wrap justify-content-between align-items-center">
                        <h3 class="section-title title-rose"><i class="fas fa-paperclip me-2"></i>مدیریت فایل‌ها</h3>
                        <div class="d-flex gap-2">
                            <button class="btn btn-rose" onclick="addMockFile()"><i class="fas fa-upload me-1"></i> آپلود (نمونه)</button>
                            <button class="btn btn-red" onclick="exportFilesExcel()"><i class="fas fa-file-excel me-1"></i> اکسل</button>
                        </div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <input type="text" class="form-control" id="fileSearch" placeholder="جستجوی فایل ..." oninput="renderFiles()">
                        </div>
                        <div class="col-md-3">
                            <input type="date" class="form-control" id="fileDateFilter" onchange="renderFiles()">
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="fileCategoryFilter" onchange="renderFiles()">
                                <option value="">همه دسته‌بندی‌ها</option>
                            </select>
                        </div>
                    </div>
                    <div id="filesContainer"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- مودال‌ها (همان‌های قبلی) -->
    <div class="modal fade" id="filterModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-blue"><i class="fas fa-filter me-2"></i>فیلتر پیشرفته</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label fw-bold">از تاریخ</label><input type="date" class="form-control" id="filterDateFrom"></div>
                    <div class="mb-3"><label class="form-label fw-bold">تا تاریخ</label><input type="date" class="form-control" id="filterDateTo"></div>
                    <div class="mb-3"><label class="form-label fw-bold">دسته‌بندی</label><select class="form-select" id="filterCategory"><option value="">همه</option></select></div>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">بستن</button>
                    <button class="btn btn-blue" onclick="applyFilter()" data-bs-dismiss="modal">اعمال فیلتر</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content p-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-green"><i class="fas fa-edit me-2"></i>ویرایش کالا</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label fw-bold">دسته‌بندی <span class="text-danger">*</span></label><input type="text" class="form-control" id="editCategory" oninput="autoUpperCase(this)"></div>
                        <div class="col-md-6"><label class="form-label fw-bold">برند</label><input type="text" class="form-control" id="editBrand" oninput="autoUpperCase(this)"></div>
                        <div class="col-md-4"><label class="form-label fw-bold">مدل <span class="text-danger">*</span></label><input type="text" class="form-control" id="editModel" oninput="autoUpperCase(this)"></div>
                        <div class="col-md-4"><label class="form-label fw-bold">کد قفسه <span class="text-danger">*</span></label><input type="text" class="form-control" id="editShelf" oninput="autoUpperCase(this)"></div>
                        <div class="col-md-4"><label class="form-label fw-bold">کد اموال</label><input type="text" class="form-control" id="editAsset" oninput="autoUpperCase(this)"></div>
                        <div class="col-md-4"><label class="form-label fw-bold">کد محصول <span class="text-danger">*</span></label><input type="text" class="form-control" id="editProductCode" oninput="autoUpperCase(this)"></div>
                        <div id="editDynamicFields" class="col-12"></div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">لغو</button>
                    <button class="btn btn-green" onclick="saveEdit()"><i class="fas fa-check me-1"></i>ذخیره تغییرات</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editFileModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-rose"><i class="fas fa-edit me-2"></i>ویرایش فایل</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editFileId">
                    <div class="mb-3"><label class="form-label fw-bold">نام فایل</label><input type="text" class="form-control" id="editFileName"></div>
                    <div class="mb-3"><label class="form-label fw-bold">دسته‌بندی</label><select class="form-select" id="editFileCategory"></select></div>
                    <div class="mb-3"><label class="form-label fw-bold">تاریخ</label><input type="date" class="form-control" id="editFileDate"></div>
                    <div class="mb-3"><label class="form-label fw-bold">توضیحات</label><input type="text" class="form-control" id="editFileDesc"></div>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">لغو</button>
                    <button class="btn btn-rose" onclick="saveFileEdit()"><i class="fas fa-check me-1"></i>ذخیره تغییرات</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content p-4 text-center">
                <div class="modal-body">
                    <i class="fas fa-exclamation-triangle text-danger fs-1 mb-3"></i>
                    <h5 class="fw-bold" id="deleteModalMessage">آیا از حذف این مورد مطمئن هستید؟</h5>
                    <p class="text-muted small">این عمل غیرقابل بازگشت است.</p>
                </div>
                <div class="modal-footer border-0 justify-content-center">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                    <button class="btn btn-danger" id="confirmDeleteBtn"><i class="fas fa-trash me-1"></i>حذف</button>
                </div>
            </div>
        </div>
    </div>

    <!-- کتابخانه‌های JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- استفاده از xlsx-style به جای xlsx برای استایل‌دهی -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx-style/0.8.13/xlsx.full.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
